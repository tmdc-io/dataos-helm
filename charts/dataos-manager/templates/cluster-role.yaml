{{- if .Values.rbac }}
{{- if .Values.rbac.clusterRole }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.clusterRole.name }}
  {{- if .Values.rbac.annotations }}
  annotations:
{{ toYaml .Values.rbac.annotations | indent 4 }}
  {{- end }}
  labels:
    app: {{ .Values.label }}
    app.kubernetes.io/name: '{{ .Values.label }}'
    app.kubernetes.io/component: 'cluster-role'
    app.kubernetes.io/part-of: '{{ .Values.application }}'
    {{- if .Values.rbac.labels }}
{{ toYaml .Values.rbac.labels | indent 4 }}
    {{- end }}
rules:
{{ toYaml .Values.rbac.clusterRole.rules | indent 2 }}
{{- end }}
{{- end }}